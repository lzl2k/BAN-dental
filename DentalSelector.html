<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Dental Selector — BAN Dental</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f4fa;
    font-family: 'DM Sans', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .container { width: 100%; max-width: 380px; }
  .header { text-align: center; margin-bottom: 12px; }
  .header h2 { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.15em; text-transform: uppercase; }
  .header p { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .chips-box {
    margin-bottom: 12px; background: #fff; border-radius: 16px;
    border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    padding: 10px 14px; min-height: 52px;
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  }
  .chips-placeholder { color: #94a3b8; font-size: 12px; width: 100%; text-align: center; }
  .chips-label { font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; background: #2563eb; color: #fff;
    border: none; border-radius: 999px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .chip span { color: #93c5fd; font-size: 12px; }
  .clear-btn {
    background: none; border: none; cursor: pointer;
    font-size: 10px; color: #94a3b8; font-family: inherit; font-weight: 500; margin-right: auto;
  }
  .chart-wrap {
    background: linear-gradient(180deg, #f8fafc 0%, #fff 50%, #f8fafc 100%);
    border-radius: 24px; border: 1px solid #e2e8f0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden;
  }
  svg { width: 100%; display: block; touch-action: none; }
  .footer-row { margin-top: 8px; display: flex; justify-content: space-between; padding: 0 4px; }
  .footer-hint { font-size: 11px; color: #94a3b8; }
  .footer-nums { font-size: 11px; color: #cbd5e1; font-family: monospace; }
  .confirm-btn {
    width: 100%; padding: 13px; background: #2563eb; color: #fff;
    border: none; border-radius: 16px; font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 12px; font-family: inherit;
    box-shadow: 0 4px 14px rgba(37,99,235,0.25); display: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>Tooth Selection</h2>
    <p>FDI Numbering System</p>
  </div>
  <div class="chips-box" id="chipsBox">
    <span class="chips-placeholder">اضغط على السن لتحديده — Tap a tooth to select</span>
  </div>
  <div class="chart-wrap">
    <svg id="dentalSvg" viewBox="0 0 400 462"></svg>
  </div>
  <div class="footer-row">
    <span class="footer-hint" id="footerHint">Tap to select</span>
    <span class="footer-nums" id="footerNums">[]</span>
  </div>
  <button class="confirm-btn" id="confirmBtn" onclick="confirmSelection()">
    Confirm Selection — تأكيد الاختيار
  </button>
</div>

<script>
const UA = { cx:200, cy:148, rx:154, ry:112 };
const LA = { cx:200, cy:315, rx:138, ry:98  };

const UA_DEG = [200,213,225,236,246,255,263,269,271,277,285,294,304,315,327,340];
const LA_DEG = [160,147,133,121,110,101,94,91,89,86,79,70,59,47,33,20];

const UPPER = [
  {n:18,t:'M'},{n:17,t:'M'},{n:16,t:'M'},{n:15,t:'P'},{n:14,t:'P'},
  {n:13,t:'C'},{n:12,t:'L'},{n:11,t:'I'},
  {n:21,t:'I'},{n:22,t:'L'},{n:23,t:'C'},
  {n:24,t:'P'},{n:25,t:'P'},{n:26,t:'M'},{n:27,t:'M'},{n:28,t:'M'},
];
const LOWER = [
  {n:48,t:'M'},{n:47,t:'M'},{n:46,t:'M'},{n:45,t:'P'},{n:44,t:'P'},
  {n:43,t:'C'},{n:42,t:'L'},{n:41,t:'I'},
  {n:31,t:'I'},{n:32,t:'L'},{n:33,t:'C'},
  {n:34,t:'P'},{n:35,t:'P'},{n:36,t:'M'},{n:37,t:'M'},{n:38,t:'M'},
];

const SHAPE = {
  M:"M-11,12 C-11,14.5 -8,16 -3,16 L3,16 C8,16 11,14.5 11,12 L11,-10 C11,-14 7.5,-16 3,-16 L-3,-16 C-7.5,-16 -11,-14 -11,-10 Z",
  P:"M-8,11 C-8,13.5 -4.5,15 0,15 C4.5,15 8,13.5 8,11 L8,-9 C8,-13 4.5,-14.5 0,-14.5 C-4.5,-14.5 -8,-13 -8,-9 Z",
  C:"M0,-17 C3.5,-17 7,-12 7,-6 L7,11 C7,13.5 4,15 0,15 C-4,15 -7,13.5 -7,11 L-7,-6 C-7,-12 -3.5,-17 0,-17 Z",
  L:"M-5.5,-12.5 C-3.5,-14.5 3.5,-14.5 5.5,-12.5 L6,10.5 C6,13 3.5,14 0,14 C-3.5,14 -6,13 -6,10.5 Z",
  I:"M-7.5,-11 C-5,-13.5 5,-13.5 7.5,-11 L7.5,11 C7.5,13.5 4.5,15 0,15 C-4.5,15 -7.5,13.5 -7.5,11 Z",
};
const HIGHLIGHT = {
  M:"M-7,12 C-7,13.5 -4.5,14.5 -1,14.5 L1,14.5 C4.5,14.5 7,13.5 7,12 L7,-8 C7,-11.5 5,-13.5 2,-13.5 L-2,-13.5 C-5,-13.5 -7,-11.5 -7,-8 Z",
  P:"M-5,11 C-5,12.5 -3,13.5 0,13.5 C3,13.5 5,12.5 5,11 L5,-7 C5,-10.5 3,-12 0,-12 C-3,-12 -5,-10.5 -5,-7 Z",
  C:"M0,-13 C2.5,-13 5,-9 5,-5 L5,9 C5,11.5 3,13 0,13 C-3,13 -5,11.5 -5,9 L-5,-5 C-5,-9 -2.5,-13 0,-13 Z",
  L:"M-3.5,-10 C-2,-12 2,-12 3.5,-10 L4,9 C4,11 2.5,12 0,12 C-2.5,12 -4,11 -4,9 Z",
  I:"M-5,-8.5 C-3.5,-11 3.5,-11 5,-8.5 L5,9 C5,11.5 3,13 0,13 C-3,13 -5,11.5 -5,9 Z",
};

const selected = new Set();

function S(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
  return el;
}

function archPos(arch, deg) {
  const r = deg * Math.PI / 180;
  const x = arch.cx + arch.rx * Math.cos(r);
  const y = arch.cy - arch.ry * Math.sin(r);
  const rot = Math.atan2(arch.cy-y, arch.cx-x) * 180/Math.PI + 90;
  return {x,y,rot};
}

function archPath(arch, d0, d1, steps=30) {
  const pts=[];
  for(let i=0;i<=steps;i++){
    const deg=d0+((d1-d0)*i)/steps;
    const r=deg*Math.PI/180;
    pts.push(`${(arch.cx+arch.rx*Math.cos(r)).toFixed(1)},${(arch.cy-arch.ry*Math.sin(r)).toFixed(1)}`);
  }
  return `M ${pts.join(" L ")}`;
}

function buildSVG() {
  const svg = document.getElementById("dentalSvg");

  // defs + gradients
  const defs = S("defs");
  const rg = S("radialGradient",{id:"chartBg",cx:"50%",cy:"40%",r:"65%"});
  const rs1=S("stop",{offset:"0%","stop-color":"#f8fafc"});
  const rs2=S("stop",{offset:"100%","stop-color":"#eef2f8"});
  rg.append(rs1,rs2); defs.appendChild(rg);

  // per-tooth gradients
  [...UPPER,...LOWER].forEach(({n})=>{
    const lg=S("linearGradient",{id:`sg${n}`,x1:"0",y1:"-1",x2:"0",y2:"1"});
    lg.append(
      S("stop",{offset:"0%","stop-color":"#7ab8ff"}),
      S("stop",{offset:"40%","stop-color":"#2d6ef5"}),
      S("stop",{offset:"100%","stop-color":"#1435c0"})
    );
    defs.appendChild(lg);
  });
  svg.appendChild(defs);

  // bg
  svg.appendChild(S("rect",{width:"400",height:"462",fill:"url(#chartBg)"}));

  // labels
  function txt(x,y,str,anchor,size,color,spacing){
    const t=S("text",{x,y,"text-anchor":anchor||"middle","font-size":size||"8.5",fill:color||"#b0bcd0","letter-spacing":spacing||"2.5","font-weight":"600"});
    t.textContent=str; svg.appendChild(t);
  }
  txt(200,20,"UPPER / الفك العلوي");
  txt(200,450,"LOWER / الفك السفلي");
  [["Q1",55,36,"start"],["Q2",345,36,"end"],["Q4",55,434,"start"],["Q3",345,434,"end"]].forEach(([l,lx,ly,ta])=>{
    txt(lx,ly,l,ta,"7.5","#d4dce8","1");
  });

  // arch guides
  svg.appendChild(S("path",{d:archPath(UA,197,343),fill:"none",stroke:"#dde5f2","stroke-width":"1.5","stroke-linecap":"round"}));
  svg.appendChild(S("path",{d:archPath(LA,163,17),fill:"none",stroke:"#dde5f2","stroke-width":"1.5","stroke-linecap":"round"}));
  svg.appendChild(S("path",{d:archPath({...UA,rx:UA.rx+20,ry:UA.ry+18},198,342),fill:"none",stroke:"#edf1f8","stroke-width":"1"}));
  svg.appendChild(S("path",{d:archPath({...LA,rx:LA.rx+20,ry:LA.ry+18},162,18),fill:"none",stroke:"#edf1f8","stroke-width":"1"}));

  // midline
  svg.appendChild(S("line",{x1:"200",y1:"220",x2:"200",y2:"238",stroke:"#c8d4e8","stroke-width":"1.5","stroke-dasharray":"2,3"}));
  svg.appendChild(S("circle",{cx:"200",cy:"229",r:"2.5",fill:"#dde5f2"}));

  // teeth
  UPPER.forEach((tooth,i)=>{ const p=archPos(UA,UA_DEG[i]); addTooth(svg,tooth.n,tooth.t,p.x,p.y,p.rot); });
  LOWER.forEach((tooth,i)=>{ const p=archPos(LA,LA_DEG[i]); addTooth(svg,tooth.n,tooth.t,p.x,p.y,p.rot); });
}

function addTooth(svg, n, t, x, y, rot) {
  const g = S("g",{transform:`translate(${x.toFixed(1)},${y.toFixed(1)}) rotate(${rot.toFixed(1)})`});
  g.style.cursor="pointer";

  const glow = S("path",{d:SHAPE[t],fill:"none",stroke:"#3b82f6","stroke-width":"11","stroke-opacity":"0.18","stroke-linejoin":"round"});
  glow.style.display="none";

  const shadow = S("path",{d:SHAPE[t],fill:"rgba(30,50,90,0.10)",transform:"translate(0.5,1.5)"});
  const body   = S("path",{d:SHAPE[t],fill:"#e9edf5",stroke:"#b8c4d8","stroke-width":"1.2","stroke-linejoin":"round"});
  const hl     = S("path",{d:HIGHLIGHT[t],fill:"rgba(255,255,255,0.55)"});

  const label  = S("text",{"text-anchor":"middle",dy:"0.36em","font-size":t==="M"?"7.5":"7","font-weight":"500",fill:"#5a6a82","font-family":"'DM Sans',Arial,sans-serif"});
  label.style.pointerEvents="none"; label.style.userSelect="none";
  label.textContent=n;

  g.append(glow, shadow, body, hl, label);

  g.addEventListener("click",()=>toggleTooth(n,t));
  g.addEventListener("pointerenter",()=>{ if(!selected.has(n)){ body.setAttribute("fill","#d4dce9"); body.setAttribute("stroke","#607090"); }});
  g.addEventListener("pointerleave",()=>{ if(!selected.has(n)){ body.setAttribute("fill","#e9edf5"); body.setAttribute("stroke","#b8c4d8"); }});

  g.dataset.n = n;
  svg.appendChild(g);
}

function toggleTooth(n) {
  selected.has(n) ? selected.delete(n) : selected.add(n);
  const g = document.querySelector(`[data-n="${n}"]`);
  const on = selected.has(n);
  const glow=g.children[0], body=g.children[2], hl=g.children[3], lbl=g.children[4];
  glow.style.display = on?"":"none";
  body.setAttribute("fill", on?`url(#sg${n})`:"#e9edf5");
  body.setAttribute("stroke", on?"#1a44c8":"#b8c4d8");
  body.setAttribute("stroke-width", on?"1.8":"1.2");
  hl.setAttribute("fill", on?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.55)");
  lbl.setAttribute("fill", on?"#fff":"#5a6a82");
  lbl.setAttribute("font-weight", on?"700":"500");
  updateUI();
}

function removeTooth(n){ selected.delete(n); toggleTooth(n); }

function clearAll(){
  const copy=[...selected];
  selected.clear();
  copy.forEach(n=>{
    const g=document.querySelector(`[data-n="${n}"]`);
    const glow=g.children[0],body=g.children[2],hl=g.children[3],lbl=g.children[4];
    glow.style.display="none";
    body.setAttribute("fill","#e9edf5"); body.setAttribute("stroke","#b8c4d8"); body.setAttribute("stroke-width","1.2");
    hl.setAttribute("fill","rgba(255,255,255,0.55)");
    lbl.setAttribute("fill","#5a6a82"); lbl.setAttribute("font-weight","500");
  });
  updateUI();
}

function updateUI(){
  const arr=[...selected].sort((a,b)=>a-b);
  const box=document.getElementById("chipsBox");
  const hint=document.getElementById("footerHint");
  const nums=document.getElementById("footerNums");
  const btn=document.getElementById("confirmBtn");
  nums.textContent=`[${arr.join(",")}]`;
  if(arr.length===0){
    box.innerHTML=`<span class="chips-placeholder">اضغط على السن لتحديده — Tap a tooth to select</span>`;
    hint.textContent="Tap to select"; btn.style.display="none";
  } else {
    let h=`<span class="chips-label">${arr.length} selected</span>`;
    arr.forEach(n=>{ h+=`<button class="chip" onclick="removeTooth(${n})">${n} <span>×</span></button>`; });
    h+=`<button class="clear-btn" onclick="clearAll()">Clear all</button>`;
    box.innerHTML=h;
    hint.textContent=`${arr.length} tooth${arr.length>1?"teeth":""} selected`;
    btn.style.display="block";
  }
}

function confirmSelection(){
  const arr=[...selected].sort((a,b)=>a-b);
  alert(`الأسنان المحددة:\n[${arr.join(", ")}]`);
}

buildSVG();
</script>
</body>
</html>
